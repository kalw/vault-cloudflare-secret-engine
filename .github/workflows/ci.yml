name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Unit tests
        run: go test ./... -v

  acceptance:
    name: Acceptance tests (live Cloudflare)
    runs-on: ubuntu-latest
    needs: test
    # Never expose secrets to pull requests from forks.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Acceptance tests
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_TEST_POLICIES: ${{ secrets.CLOUDFLARE_TEST_POLICIES }}
          # Optional: enables the user-context (token_type=user) case.
          CLOUDFLARE_USER_API_TOKEN: ${{ secrets.CLOUDFLARE_USER_API_TOKEN }}
          CLOUDFLARE_USER_TEST_POLICIES: ${{ secrets.CLOUDFLARE_USER_TEST_POLICIES }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Cloudflare secrets not configured; skipping live acceptance tests."
            echo "Add CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN repository secrets to enable."
            exit 0
          fi
          VAULT_ACC=1 go test -run TestAcceptance -v -count=1
